###############################################################
#  Cortex AI Gateway — nginx configuration
#
#  Proxies requests to Ollama with rate limiting.
#  Edit OLLAMA_BACKEND below to point to your Ollama instance.
###############################################################

# Number of worker processes (auto = one per CPU core)
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 64;
}

http {
    # ----------------------------------------------------------
    #  EDIT THIS: point to your Ollama instance
    #  Examples:
    #    - Ollama on same host:        http://host.docker.internal:11434
    #    - Ollama on another machine:  http://192.168.1.x:11434
    #    - Ollama in another container: http://ollama:11434
    # ----------------------------------------------------------
    upstream ollama_backend {
        server host.docker.internal:11434;
        keepalive 4;
    }

    # Rate limiting: max 10 inference requests per minute per IP
    # Adjust if your monitoring cycle is more frequent
    limit_req_zone $binary_remote_addr zone=inference:1m rate=10r/m;

    # Access log with timing info (useful for debugging slow inference)
    log_format cortex '$remote_addr [$time_local] "$request" '
                      '$status $body_bytes_sent ${request_time}s';
    access_log /var/log/nginx/access.log cortex;

    server {
        listen 8080;
        server_name _;

        # ----------------------------------------------------------
        #  Health check endpoint (used by Docker healthcheck)
        # ----------------------------------------------------------
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ----------------------------------------------------------
        #  Ollama inference endpoint (rate limited)
        # ----------------------------------------------------------
        location /api/generate {
            limit_req zone=inference burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://ollama_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;

            # Inference can be slow — generous timeouts
            proxy_connect_timeout  10s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            # Disable buffering for streaming responses
            proxy_buffering off;
        }

        # ----------------------------------------------------------
        #  Ollama model management (no rate limit)
        # ----------------------------------------------------------
        location /api/ {
            proxy_pass         http://ollama_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
        }

        # ----------------------------------------------------------
        #  Block everything else
        # ----------------------------------------------------------
        location / {
            return 404 "Not found\n";
        }
    }
}
